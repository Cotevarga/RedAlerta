services:
  - type: web
    name: redalerta-backend
    runtime: docker
    repo: https://github.com/tu-usuario/RedAlerta
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: redalerta-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: redalerta-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: redalerta-db
          property: password
      - key: CORS_ORIGINS
        value: https://redalerta-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: adminMuni
      - key: ADMIN_PASSWORD
        value: Corral2026
      - key: RENDER_URL
        value: https://redalerta-backend.onrender.com

  - type: web
    name: redalerta-frontend
    runtime: docker
    repo: https://github.com/tu-usuario/RedAlerta
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        value: https://redalerta-backend.onrender.com

  - type: worker
    name: redalerta-bot
    runtime: docker
    repo: https://github.com/tu-usuario/RedAlerta
    dockerfilePath: ./bot-rutarural/Dockerfile
    envVars:
      - key: BACKEND_URL
        value: https://redalerta-backend.onrender.com
