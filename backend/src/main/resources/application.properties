spring.application.name=demo
# ==========================================
# CONFIGURACIÓN DE CONEXIÓN A NEON.TECH (POSTGRESQL)
# ==========================================

# URL JDBC formateada correctamente para Spring Boot
spring.datasource.url=jdbc:postgresql://ep-red-grass-ac1rm1qb.sa-east-1.aws.neon.tech/neondb?sslmode=require

# Usuario oficial de tu base de datos Neon
spring.datasource.username=neondb_owner

# Contraseña real provista por tu cadena de conexión
spring.datasource.password=npg_jh3BcXCZO8MV

# Driver oficial de comunicación nativa con PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# CONFIGURACIÓN DE HIBERNATE / JPA (MIGRAClÓN Y DIAGNÓSTICO)
# ==========================================

# 'update' creará o actualizará automáticamente las tablas en Neon según tus entidades Java
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola de tu IDE las consultas SQL reales (Útil para las evaluaciones de Duoc UC)
spring.jpa.show-sql=true

# Formatea el SQL impreso en consola para que sea legible y estructurado
spring.jpa.properties.hibernate.format_sql=true

# Forzar el uso del dialecto nativo de PostgreSQL en Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect